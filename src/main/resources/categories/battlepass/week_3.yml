battlepass: battlepass
priority: 3

name: "&8»&e Week 3 Challenges" # The name of the category
item: emerald_block 3 # The item to display in the GUI
lore: # The lore of the category
  - "&a%completed%/%total% Complete"
  - "&7%time%"

start-date: 2025-03-23 00:00 # The date the category starts %xbattlepass_category_<id>_start_date%. This must match the date format in config.yml, otherise you will get errors.
duration: -1 # (Optional) The duration of the category in minutes, set to -1 for no end. Defaults to -1 %xbattlepass_category_<id>_duration%
reset-time: -1 # (Optional) The amount of minutes between resets, set to 1440 for daily resets, set to -1 to not reset. Defaults to -1 %xbattlepass_category_<id>_reset_timer%

timer-format:
  start: "Starts in %time%"
  end: "Ends in %time%"
  reset: "Resets in %time%"
  none: "One-Time quest (does not end or reset)"

quests: # The quests in the category
  - id: week_3_1 # The ID of the quest
  - id: week_3_2 # The ID of the quest
  - id: week_3_3 # The ID of the quest
  - id: week_3_4 # The ID of the quest
  - id: week_3_5 # The ID of the quest
  - id: week_3_6 # The ID of the quest
  - id: week_3_7 # The ID of the quest