battlepass: battlepass
priority: 0
gui-title: "Daily Quests" # The title of the GUI

name: "&8»&e Daily Challenges" # The name of the category
item: nether_star 1 # The item to display in the GUI
lore: # The lore of the category
  - "&a%completed%/%total% Complete"
  - "&7%time%"

start-date: 2025-03-23 00:00 # The date the category starts %ecobattlepass_category_<id>_start_date%. This must match the date format in config.yml, otherise you will get errors.
duration: -1 # (Optional) The duration of the category in minutes, set to -1 for no end. Defaults to -1 %ecobattlepass_category_<id>_duration%
reset-time: 1440 # (Optional) The amount of minutes between resets, set to 1440 for daily resets, set to -1 to not reset. Defaults to -1 %ecobattlepass_category_<id>_reset_timer%

timer-format:
  start: "Starts in %time%"
  end: "Ends in %time%"
  reset: "Resets in %time%"
  none: "One-Time quest (does not end or reset)"

quests: # The quests in the category
  - id: free_daily_quest_1 # The ID of the quest
  - id: free_daily_quest_2 # The ID of the quest
  - id: free_daily_quest_3 # The ID of the quest
  - id: free_daily_quest_4 # The ID of the quest
  - id: free_daily_quest_5 # The ID of the quest
  - id: free_daily_quest_6 # The ID of the quest
  - id: free_daily_quest_7 # The ID of the quest